name: build

# Commits to main build and publish ONLY the container folders that changed.
# Each container is versioned individually via its own VERSION file.
on:
  push:
    branches: [main]
    # Ignore pushes that only touch repo-level docs/meta so we don't build for nothing.
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".gitignore"
      - "LICENSE"
  # PRs (e.g. Renovate updates) build + scan but do NOT push — this is the
  # status check that gates auto-merge.
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      container:
        description: "Container folder to build (blank = build all)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Figure out which container folders need building and emit them as a matrix.
  # A "container folder" is any top-level directory that contains a Dockerfile.
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so we can diff against the previous commit

      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          DISPATCH_CONTAINER: ${{ github.event.inputs.container }}
        run: |
          set -euo pipefail

          # Every top-level dir that contains a Dockerfile.
          list_all() {
            git ls-files '*/Dockerfile' | while IFS= read -r f; do
              printf '%s\n' "${f%%/*}"
            done | sort -u
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$DISPATCH_CONTAINER" ]; then
              CANDIDATES="$DISPATCH_CONTAINER"
            else
              CANDIDATES="$(list_all)"
            fi
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            # PR: build folders changed relative to the base branch.
            CANDIDATES="$(git diff --name-only "$PR_BASE" "$PR_HEAD" \
              | while IFS= read -r f; do printf '%s\n' "${f%%/*}"; done \
              | sort -u)"
          else
            # push: build folders touched between the previous and current commit.
            if [ -z "${BEFORE:-}" ] \
              || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
              || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              # First push / new branch / force-push with no valid base -> build all.
              CANDIDATES="$(list_all)"
            else
              CANDIDATES="$(git diff --name-only "$BEFORE" "$AFTER" \
                | while IFS= read -r f; do printf '%s\n' "${f%%/*}"; done \
                | sort -u)"
            fi
          fi

          # Keep only dirs that really are containers (have a Dockerfile). This
          # drops .github/, scripts/, and root files from the candidate list.
          ITEMS=""
          while IFS= read -r d; do
            [ -z "$d" ] && continue
            [ -f "$d/Dockerfile" ] || continue
            ITEMS="$ITEMS $d"

            # Soft reminder: content changed but VERSION did not -> the existing
            # version tag will be overwritten. Non-blocking on purpose.
            if [ "$EVENT_NAME" = "push" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              if [ -n "$(git diff --name-only "$BEFORE" "$AFTER" -- "$d" | grep -v "^$d/VERSION$" || true)" ] \
                && [ -z "$(git diff --name-only "$BEFORE" "$AFTER" -- "$d/VERSION")" ]; then
                echo "::warning title=No version bump::'$d' changed but $d/VERSION was not bumped; the current version tag will be overwritten."
              fi
            fi
          done <<< "$CANDIDATES"

          # Build a JSON array for the build matrix (no jq dependency).
          MATRIX="["
          first=1
          for d in $(printf '%s\n' $ITEMS | sort -u); do
            esc="$(printf '%s' "$d" | sed 's/\\/\\\\/g; s/"/\\"/g')"
            [ $first -eq 1 ] && first=0 || MATRIX="$MATRIX,"
            MATRIX="$MATRIX\"$esc\""
          done
          MATRIX="$MATRIX]"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          [ "$MATRIX" = "[]" ] && echo "any=false" >> "$GITHUB_OUTPUT" || echo "any=true" >> "$GITHUB_OUTPUT"
          echo "Containers to build: $MATRIX"

  # ---------------------------------------------------------------------------
  # Build + push each changed container. One matrix leg per container so they
  # are versioned and published independently.
  # ---------------------------------------------------------------------------
  build:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # upload Trivy + hadolint SARIF to the Security tab
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - name: Install scan tools (Trivy, hadolint)
        uses: jdx/mise-action@v4

      # Dockerfile best-practice lint. Report-only: results go to the Security
      # tab but never block a publish.
      - name: Lint Dockerfile (hadolint)
        run: hadolint --no-fail --format sarif "${{ matrix.container }}/Dockerfile" > hadolint.sarif
      - name: Upload hadolint results
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint.sarif
          category: hadolint-${{ matrix.container }}

      - name: Compute image name and tags
        id: meta
        env:
          CONTAINER: ${{ matrix.container }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          if [ ! -f "$CONTAINER/VERSION" ]; then
            echo "::error::$CONTAINER has no VERSION file"; exit 1
          fi
          VERSION="$(tr -d '[:space:]' < "$CONTAINER/VERSION")"
          if [ -z "$VERSION" ]; then
            echo "::error::$CONTAINER/VERSION is empty"; exit 1
          fi

          # GHCR requires lowercase image references.
          IMAGE="$(printf 'ghcr.io/%s/%s' "$OWNER" "$CONTAINER" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(git rev-parse --short HEAD)"

          TAGS="${IMAGE}:${VERSION}"$'\n'"${IMAGE}:latest"$'\n'"${IMAGE}:sha-${SHORT_SHA}"
          # Add rolling major and major.minor tags for strict semver versions.
          if printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${VERSION%%.*}"$'\n'"${IMAGE}:${VERSION%.*}"
          fi

          # Per-package GHCR description: optional <container>/DESCRIPTION file,
          # collapsed to one line. Set as an INDEX annotation below (a plain LABEL
          # is not read for multi-arch package pages). Falls back to a generic line.
          if [ -f "$CONTAINER/DESCRIPTION" ]; then
            DESCRIPTION="$(tr '\n' ' ' < "$CONTAINER/DESCRIPTION" | sed 's/  */ /g; s/^ *//; s/ *$//')"
          fi
          [ -z "${DESCRIPTION:-}" ] && DESCRIPTION="$CONTAINER container image"
          # Direct link to this container's own README (shown as Documentation).
          DOCS_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/main/${CONTAINER}/README.md"

          {
            echo "image=$IMAGE"
            echo "version=$VERSION"
            echo "docs_url=$DOCS_URL"
            echo "description<<DESC_EOF"
            printf '%s\n' "$DESCRIPTION"
            echo "DESC_EOF"
            echo "tags<<TAGS_EOF"
            printf '%s\n' "$TAGS"
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### \`$CONTAINER\` → \`$VERSION\`"
            printf '%s\n' "$TAGS" | sed 's/^/- `/; s/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: docker/setup-qemu-action@v3 # enables arm64 emulation (only needed for multi-arch)
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build amd64 into the local daemon so Trivy scans the EXACT image we're
      # about to publish — before it is pushed.
      - name: Build image for scanning (amd64)
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.container }}
          platforms: linux/amd64
          load: true
          tags: scan-target:${{ matrix.container }}
          cache-from: type=gha,scope=${{ matrix.container }}
          cache-to: type=gha,mode=max,scope=${{ matrix.container }}

      # Full HIGH/CRITICAL report (including unfixed) -> Security tab.
      - name: Trivy vulnerability report
        run: |
          trivy image --scanners vuln --no-progress \
            --severity HIGH,CRITICAL \
            --format sarif --output trivy.sarif \
            "scan-target:${{ matrix.container }}"
      - name: Upload Trivy results
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ matrix.container }}

      # Gate: block the publish on FIXABLE HIGH/CRITICAL vulnerabilities.
      - name: Trivy gate (fixable HIGH/CRITICAL)
        run: |
          trivy image --scanners vuln --no-progress \
            --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 \
            "scan-target:${{ matrix.container }}"

      # SBOM (CycloneDX) of the exact image, uploaded as a build artifact.
      # Kept off the image (no attestation) so the GHCR package listing stays clean.
      - name: Generate SBOM (CycloneDX)
        run: |
          trivy image --no-progress \
            --format cyclonedx \
            --output "sbom-${{ matrix.container }}.cdx.json" \
            "scan-target:${{ matrix.container }}"
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.container }}
          path: sbom-${{ matrix.container }}.cdx.json
          if-no-files-found: error

      # Publish (multi-arch). Skipped on pull_request — PRs only build + scan.
      - name: Build and push (multi-arch)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.container }}
          # Multi-arch: arm64 is built under QEMU emulation (slower). Drop
          # ",linux/arm64" to build amd64 only if you want faster builds.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ matrix.container }}
            org.opencontainers.image.description=${{ steps.meta.outputs.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ steps.meta.outputs.docs_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          # INDEX-level annotations are what GHCR reads for a multi-arch package's
          # description/links. Labels alone are not shown on the package page.
          annotations: |
            index:org.opencontainers.image.title=${{ matrix.container }}
            index:org.opencontainers.image.description=${{ steps.meta.outputs.description }}
            index:org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            index:org.opencontainers.image.documentation=${{ steps.meta.outputs.docs_url }}
            index:org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            index:org.opencontainers.image.revision=${{ github.sha }}
          provenance: false # keeps the GHCR package listing clean; flip to true for supply-chain attestations
          cache-from: type=gha,scope=${{ matrix.container }}
          cache-to: type=gha,mode=max,scope=${{ matrix.container }}

      # Confirm the description/link annotations actually landed on the index.
      - name: Verify package annotations
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          echo "### \`${{ matrix.container }}\` index annotations" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            --format '{{ json .Manifest.Annotations }}' | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Independent check: the README Containers catalog must match the DESCRIPTIONs.
  # Runs alongside build/detect and does not block publishing.
  # ---------------------------------------------------------------------------
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: README catalog is up to date
        run: ./scripts/gen-catalog.sh --check
